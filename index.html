<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Prompt Engine 2.0</title>

<style>
body{
background:#0f0f0f;
color:white;
font-family:Arial;
padding:20px;
}
textarea{
width:100%;
height:120px;
margin-bottom:10px;
background:#1e1e1e;
color:white;
border:none;
padding:10px;
border-radius:8px;
}
button{
padding:10px 15px;
margin:5px 0;
border:none;
border-radius:8px;
background:#00ff88;
color:black;
font-weight:bold;
cursor:pointer;
}
.result{
margin-top:15px;
background:#1a1a1a;
padding:15px;
border-radius:10px;
white-space:pre-wrap;
}
.select{
margin-bottom:10px;
}
</style>
</head>
<body>

<h2>Human Prompt Engine 2.0</h2>

<select id="nivel" class="select">
<option value="baixo">Realismo Baixo</option>
<option value="medio" selected>Realismo Médio</option>
<option value="extremo">Realismo Extremo</option>
</select>

<textarea id="entrada" placeholder="Cole seu prompt aqui..."></textarea>

<button onclick="melhorar()">Melhorar Prompt</button>

<div class="result" id="saida"></div>

<script>

function melhorar(){

let texto = document.getElementById("entrada").value;
let nivel = document.getElementById("nivel").value;

const base = {
baixo: "realistic photo, natural lighting",
medio: "ultra realistic photo, 35mm lens, natural skin texture, slight imperfections, natural lighting, subtle shadows",
extremo: "ultra realistic RAW photo, handheld camera, 35mm lens, shallow depth of field, natural skin pores, uneven exposure, sensor noise, compression artifacts, imperfect framing, no CGI look"
};

let resultado = base[nivel] + ", " + texto;

document.getElementById("saida").innerText = resultado;

}

</script>

</body>
</html>
