<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HumanPrompt Ultra Engine</title>

<style>
body{
font-family: Arial, sans-serif;
background:#0f0f0f;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:#1c1c1c;
padding:20px;
border-radius:12px;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

.tabs{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.tabs button{
flex:1;
margin:2px;
padding:10px;
border:none;
background:#2a2a2a;
color:white;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.tabs button.active{
background:#00ff88;
color:black;
font-weight:bold;
}

textarea{
width:100%;
height:180px;
border-radius:8px;
padding:10px;
border:none;
resize:none;
}

button.generate{
background:#00ff88;
border:none;
padding:12px;
width:100%;
border-radius:8px;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>HumanPrompt Ultra Engine</h2>
<p style="opacity:0.6;font-size:14px;">
UGC • Hiper Real • iPhone Real Camera • Anti-IA
</p>

<div class="tabs">
<button onclick="setMode('melhorar')" id="tab1" class="active">Melhorar Prompt</button>
<button onclick="setMode('ugc')" id="tab2">UGC Ultra</button>
<button onclick="setMode('pro')" id="tab3">Ultra Real PRO</button>
<button onclick="setMode('hiper')" id="tab4">Hiper Real iPhone</button>
</div>

<textarea id="entrada" placeholder="Cole seu prompt aqui..."></textarea>

<button class="generate" onclick="gerar()">Gerar Prompt</button>

<textarea id="saida" placeholder="Seu prompt final aparecerá aqui..."></textarea>

</div>

<script>

let modo = "melhorar";

function setMode(m){
modo = m;

document.querySelectorAll(".tabs button").forEach(btn => btn.classList.remove("active"));

if(m=="melhorar") document.getElementById("tab1").classList.add("active");
if(m=="ugc") document.getElementById("tab2").classList.add("active");
if(m=="pro") document.getElementById("tab3").classList.add("active");
if(m=="hiper") document.getElementById("tab4").classList.add("active");
}

function gerar(){

let texto = document.getElementById("entrada").value;

let baseMelhorar = `
${texto},
improved composition,
natural lighting,
realistic shadows,
cinematic framing,
high detail,
photorealistic quality
`;

let baseUGC = `
${texto},
ultra realistic UGC photo,
smartphone camera capture,
natural window lighting,
handheld shot,
visible skin pores,
natural skin texture variation,
realistic hair strands,
subtle imperfections,
organic shadows,
slight motion blur,
sensor noise,
minor compression artifacts,
no CGI,
no AI look,
no smooth plastic skin,
no artificial symmetry
`;

let basePro = `
${texto},
ultra realistic professional photo,
natural color science,
real skin pores visible,
uneven skin tone,
subtle redness,
fine lines,
natural under eye texture,
peach fuzz visible,
realistic hair texture,
imperfect exposure,
organic depth of field,
natural dynamic range limitation,
no beauty filter,
no retouching,
no CGI,
no AI look,
no artificial smoothness
`;

let baseHiper = `
${texto},
HYPER REALISTIC iPhone photo,
shot on iPhone 15 Pro,
Apple natural color science,
HDR Smart iPhone processing,
handheld capture,
natural window lighting,
skin texture fully detailed,
visible pores in high resolution,
uneven pigmentation,
natural redness,
micro blemishes,
light oil reflection,
fine facial hair visible,
baby hairs detailed,
realistic facial asymmetry,
subtle skin translucency,
organic shadow falloff,
minor exposure imbalance,
sensor grain,
real smartphone dynamic range,
slight motion blur,
authentic mobile compression,
no beauty filter,
no skin smoothing,
no retouching,
no CGI,
no 3D render,
no AI look,
no artificial perfection,
no plastic texture,
true human skin realism
`;

if(modo=="melhorar"){
document.getElementById("saida").value = baseMelhorar;
}

if(modo=="ugc"){
document.getElementById("saida").value = baseUGC;
}

if(modo=="pro"){
document.getElementById("saida").value = basePro;
}

if(modo=="hiper"){
document.getElementById("saida").value = baseHiper;
}

}

</script>

</body>
</html>
