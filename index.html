<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HumanPrompt Realismo Máximo</title>

<style>
body{
font-family: Arial, sans-serif;
background:#0a0a0a;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:720px;
margin:auto;
background:#141414;
padding:25px;
border-radius:18px;
box-shadow:0 0 50px rgba(0,0,0,0.9);
}

h2{
margin-bottom:5px;
}

p{
opacity:0.6;
font-size:14px;
margin-bottom:15px;
}

textarea{
width:100%;
height:180px;
border-radius:12px;
padding:12px;
border:none;
resize:none;
margin-bottom:10px;
background:#0f0f0f;
color:white;
}

button{
background:#00ff88;
border:none;
padding:15px;
width:100%;
border-radius:14px;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

button:hover{
opacity:0.85;
}
</style>
</head>

<body>

<div class="container">

<h2>HumanPrompt Engine 6.0</h2>
<p>Realismo Absoluto • Física Real iPhone • Anti-IA Extremo</p>

<textarea id="entrada" placeholder="Cole seu prompt aqui..."></textarea>

<button onclick="gerar()">Gerar Prompt 100% Real</button>

<textarea id="saida" placeholder="Seu prompt final ultra real aparecerá aqui..."></textarea>

</div>

<script>

function gerar(){

let texto = document.getElementById("entrada").value;

let promptFinal = `
${texto},

RAW documentary style photo,
shot on iPhone 15 Pro main camera,
24mm equivalent lens,
f/1.78 smartphone optics,
true small sensor physics,
natural automatic exposure,
real Apple Smart HDR processing,
handheld capture,
micro hand shake realism,
subtle rolling shutter effect,
natural highlight clipping,
realistic shadow noise floor,
authentic smartphone dynamic range limitation,
minor chromatic aberration on edges,
slight lens distortion typical of wide smartphone lens,
real spatial compression,
true-to-life perspective geometry,
background fully in focus,
no portrait mode,
no artificial depth of field,
no cinematic blur,
no fake bokeh,
no subject isolation blur,
natural ambient lighting,
window daylight or realistic indoor lighting,
uneven shadow falloff,
natural white balance shift,
slight exposure inconsistency,
real compression artifacts from social media upload,
organic color rendering,
skin texture extremely detailed,
visible pores in high resolution,
uneven skin tone variation,
natural redness areas,
micro blemishes,
subtle acne texture,
light natural oil reflection,
fine facial hair visible,
baby hairs imperfect,
realistic facial asymmetry,
skin translucency variation,
under-eye texture natural,
no beauty filter,
no skin smoothing,
no retouching,
no artificial sharpening,
no HDR exaggeration,
no CGI,
no 3D render,
no illustration,
no hyper stylization,
no AI look,
no artificial perfection,
no symmetry correction,
true human skin realism,
authentic real world smartphone photography
`;

document.getElementById("saida").value = promptFinal;

}

</script>

</body>
</html>
