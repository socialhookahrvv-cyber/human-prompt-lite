<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sloow HumanPrompt Ultra Engine</title>

<style>
body{
font-family: Arial, sans-serif;
background:#0f0f0f;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:650px;
margin:auto;
background:#1c1c1c;
padding:20px;
border-radius:14px;
box-shadow:0 0 30px rgba(0,0,0,0.6);
}

h2{
margin-bottom:5px;
}

p{
opacity:0.6;
font-size:14px;
margin-bottom:15px;
}

.tabs{
display:flex;
gap:5px;
margin-bottom:15px;
flex-wrap:wrap;
}

.tabs button{
flex:1;
padding:10px;
border:none;
background:#2a2a2a;
color:white;
border-radius:8px;
cursor:pointer;
font-size:12px;
}

.tabs button.active{
background:#00ff88;
color:black;
font-weight:bold;
}

textarea{
width:100%;
height:170px;
border-radius:8px;
padding:10px;
border:none;
resize:none;
margin-bottom:10px;
}

button.generate{
background:#00ff88;
border:none;
padding:12px;
width:100%;
border-radius:10px;
font-weight:bold;
cursor:pointer;
font-size:15px;
}

button.generate:hover{
opacity:0.85;
}
</style>
</head>

<body>

<div class="container">

<h2>HumanPrompt Ultra Engine</h2>
<p>UGC • Ultra Real • Hiper Real iPhone • Anti-IA • Fundo 100% Natural</p>

<div class="tabs">
<button onclick="setMode('melhorar')" id="tab1" class="active">Melhorar</button>
<button onclick="setMode('ugc')" id="tab2">UGC Ultra</button>
<button onclick="setMode('pro')" id="tab3">Ultra Real PRO</button>
<button onclick="setMode('hiper')" id="tab4">Hiper Real iPhone</button>
</div>

<textarea id="entrada" placeholder="Cole seu prompt aqui..."></textarea>

<button class="generate" onclick="gerar()">Gerar Prompt Ultra Real</button>

<textarea id="saida" placeholder="Seu prompt final aparecerá aqui..."></textarea>

</div>

<script>

let modo = "melhorar";

function setMode(m){
modo = m;
document.querySelectorAll(".tabs button").forEach(btn => btn.classList.remove("active"));
if(m=="melhorar") document.getElementById("tab1").classList.add("active");
if(m=="ugc") document.getElementById("tab2").classList.add("active");
if(m=="pro") document.getElementById("tab3").classList.add("active");
if(m=="hiper") document.getElementById("tab4").classList.add("active");
}

function gerar(){

let texto = document.getElementById("entrada").value;

let baseMelhorar = `
${texto},
improved composition,
natural lighting,
realistic shadows,
balanced exposure,
photorealistic details
`;

let baseUGC = `
${texto},
ultra realistic UGC photo,
smartphone camera capture,
natural window lighting,
handheld shot,
background fully in focus,
no artificial blur,
real ambient environment,
visible skin pores,
natural skin texture variation,
realistic hair strands,
subtle imperfections,
organic shadows,
slight motion blur,
sensor noise,
minor compression artifacts,
no CGI,
no AI look,
no smooth plastic skin,
no artificial symmetry
`;

let basePro = `
${texto},
ultra realistic professional natural photo,
shot on smartphone,
Apple natural color science,
real skin pores visible,
uneven skin tone,
subtle redness,
fine lines,
natural under eye texture,
peach fuzz visible,
realistic hair texture,
imperfect exposure,
natural dynamic range limitation,
background completely sharp,
no depth blur,
no portrait mode,
no beauty filter,
no retouching,
no CGI,
no AI look,
no artificial smoothness
`;

let baseHiper = `
${texto},
HYPER REALISTIC iPhone photo,
shot on iPhone 15 Pro,
Apple Smart HDR,
natural automatic exposure,
handheld capture,
natural window or ambient lighting,
real world environment,
background fully in focus,
no portrait mode,
no artificial depth of field,
no background blur,
no fake bokeh,
everything naturally sharp,
true-to-life spatial depth,
real smartphone lens characteristics,
skin texture extremely detailed,
visible pores in high resolution,
uneven pigmentation,
natural redness,
micro blemishes,
light natural oil reflection,
fine facial hair visible,
baby hairs detailed,
realistic facial asymmetry,
subtle skin translucency,
organic shadow falloff,
minor exposure imbalance,
sensor grain,
authentic mobile compression artifacts,
natural highlight roll-off,
slight lens distortion,
realistic white balance shift,
no beauty filter,
no skin smoothing,
no retouching,
no CGI,
no 3D render,
no AI look,
no artificial perfection,
no plastic texture,
true human skin realism
`;

if(modo=="melhorar"){
document.getElementById("saida").value = baseMelhorar;
}
if(modo=="ugc"){
document.getElementById("saida").value = baseUGC;
}
if(modo=="pro"){
document.getElementById("saida").value = basePro;
}
if(modo=="hiper"){
document.getElementById("saida").value = baseHiper;
}

}

</script>

</body>
</html>
