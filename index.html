<script>

let nivel = "medio";
let humanizacao = 0;

const engine = {

  baseImagem: "ultra realistic photo, authentic human presence, unscripted moment",
  baseVideo: "ultra realistic handheld video, spontaneous movement, real human micro expressions",

  pele: "natural skin texture, visible pores, subtle asymmetry",
  luz: "natural lighting, uneven exposure, real shadows",
  lente: "35mm lens, shallow depth of field",
  ruido: "sensor noise, slight motion blur",
  compressao: "compression artifacts, chromatic aberration",
  imperfeicoes: "imperfect framing, slight focus breathing",
  antiIA: "no CGI look, no 3D render, no artificial smoothness, no plastic skin"
};

function detectarTipo(texto) {
  if(/video|footage|cinematic|vlog|handheld|recording/i.test(texto)) {
    return "video";
  }
  return "imagem";
}

function setNivel(n) {
  nivel = n;
}

function incrementar() {
  humanizacao++;
  alert("Nível de humanização: " + humanizacao);
}

function analisarPrompt(texto) {
  return {
    temPele: /skin|pores|texture/i.test(texto),
    temLuz: /lighting|shadow|exposure/i.test(texto),
    temLente: /mm|lens|depth|field/i.test(texto),
    temRuido: /noise|grain|blur/i.test(texto),
    temCompressao: /compression|chromatic/i.test(texto),
    artificial: /3d|render|cgi|octane|unreal/i.test(texto)
  };
}

function montarCamadasBase(tipo) {
  let base = tipo === "video" ? engine.baseVideo : engine.baseImagem;
  return base + ", " + engine.antiIA;
}

function aplicarNivel(prompt) {

  if(nivel === "baixo") {
    prompt += ", " + engine.luz;
  }

  if(nivel === "medio") {
    prompt += ", " + engine.pele + ", " + engine.luz;
  }

  if(nivel === "extremo") {
    prompt += ", " + engine.pele + ", " + engine.luz + ", " +
              engine.lente + ", " + engine.ruido + ", " +
              engine.compressao + ", " + engine.imperfeicoes;
  }

  return prompt;
}

function aplicarHumanizacaoExtra(prompt) {

  if(humanizacao >= 1) prompt += ", subtle imperfections";
  if(humanizacao >= 2) prompt += ", facial asymmetry";
  if(humanizacao >= 3) prompt += ", imperfect framing";
  if(humanizacao >= 4) prompt += ", real world exposure inconsistency";
  if(humanizacao >= 5) prompt += ", dynamic range variation";

  return prompt;
}

function gerar() {

  let desc = document.getElementById("descricao").value.trim();

  if(!desc) {
    alert("Descreva algo primeiro.");
    return;
  }

  let tipo = detectarTipo(desc);

  let prompt = montarCamadasBase(tipo) + ", " + desc;

  prompt = aplicarNivel(prompt);
  prompt = aplicarHumanizacaoExtra(prompt);

  if(tipo === "video") {
    prompt += ", vertical 9:16, smartphone recording style";
  } else {
    prompt += ", Instagram story 9:16, shot on smartphone";
  }

  document.getElementById("resultado").value = prompt;
}

function melhorarColado() {

  let texto = document.getElementById("descricao").value.trim();

  if(!texto) {
    alert("Cole um prompt primeiro.");
    return;
  }

  let analise = analisarPrompt(texto);
  let tipo = detectarTipo(texto);

  let melhorias = "";

  if(!analise.temPele) melhorias += ", " + engine.pele;
  if(!analise.temLuz) melhorias += ", " + engine.luz;
  if(!analise.temLente) melhorias += ", " + engine.lente;
  if(!analise.temRuido) melhorias += ", " + engine.ruido;
  if(!analise.temCompressao) melhorias += ", " + engine.compressao;

  if(analise.artificial) melhorias += ", " + engine.antiIA;

  melhorias += ", " + engine.imperfeicoes;

  let resultado = texto + melhorias;

  if(tipo === "video") {
    resultado += ", vertical 9:16, handheld recording";
  } else {
    resultado += ", Instagram story 9:16";
  }

  document.getElementById("resultado").value = resultado;
}

function copiar() {
  let texto = document.getElementById("resultado");
  texto.select();
  document.execCommand("copy");
  alert("Copiado!");
}

</script>
