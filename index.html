<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HumanPrompt Nano Banana Pro</title>

<style>
body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#0f0f0f,#1c1c1c);
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:#1e1e1e;
padding:20px;
border-radius:12px;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

h1{
margin-bottom:5px;
}

p{
opacity:0.7;
font-size:14px;
margin-bottom:20px;
}

button{
background:#00ff88;
border:none;
padding:12px;
width:100%;
border-radius:8px;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

button:hover{
opacity:0.85;
}

textarea{
width:100%;
height:220px;
margin-top:15px;
border-radius:8px;
padding:10px;
border:none;
resize:none;
}

label{
display:block;
margin-top:10px;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>HumanPrompt Pro</h1>
<p>Engine UGC Ultra Realista • Nano Banana Pro • Anti-IA</p>

<input type="file" id="foto" accept="image/*">

<label>
<input type="checkbox" id="modoHiper">
Modo Hiper Realismo Extremo (poros ultra visíveis)
</label>

<button onclick="gerarPromptUGC()">Gerar Prompt UGC Ultra Real</button>

<textarea id="saida" placeholder="Seu prompt ultra real aparecerá aqui..."></textarea>

</div>

<script>

function gerarPromptUGC(){

let inputFoto = document.getElementById("foto");
let file = inputFoto.files[0];

if(!file){
alert("Envie uma imagem primeiro.");
return;
}

let modoHiper = document.getElementById("modoHiper")?.checked;

let orientation = "horizontal natural framing";

let img = new Image();
img.onload = function(){

if(img.height > img.width){
orientation = "vertical 9:16 composition, Instagram Story framing";
}

let prompt = `
HYPER REALISTIC UGC photo,
shot on Nano Banana Pro,
handheld smartphone capture,
natural window lighting,
real skin texture with visible pores,
uneven skin tone variation,
natural redness in cheeks,
subtle blemishes,
micro acne texture,
light natural oil reflection,
fine lines under eyes,
natural under-eye darkness,
realistic facial asymmetry,
peach fuzz facial hair visible,
individual hair strands detailed,
slight frizz,
baby hairs visible,
non-uniform skin texture,
micro shadow variations,
organic color science,
realistic depth of field,
slight motion blur,
sensor grain,
minor compression artifacts,
no beauty filter,
no smooth skin,
no retouching,
no CGI,
no AI look,
no plastic texture,
no perfect symmetry,
no artificial lighting,
${orientation}
`;

if(modoHiper){
prompt += `
extreme micro skin detailing,
high detail visible pores,
skin translucency variation,
subtle pigmentation inconsistencies,
realistic dynamic range limitation,
minor exposure imbalance,
natural shadow falloff,
hyper realistic imperfections amplified
`;
}

document.getElementById("saida").value = prompt;

};

img.src = URL.createObjectURL(file);

}

</script>

</body>
</html>
